<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff2020; --red-dim: #a01010; --bg: #080808; --bg2: #0f0f0f;
      --bg3: #161616; --border: #1e1e1e; --text: #e0e0e0; --muted: #555;
      --yellow: #ffd93d; --pink: #ff6b6b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
    #setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .setup-card { max-width: 460px; width: 100%; text-align: center; }
    .setup-logo { font-size: 64px; color: var(--red); margin-bottom: 16px; }
    .setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; margin-bottom: 8px; }
    .setup-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .setup-input { width: 100%; padding: 14px 16px; background: var(--bg2); border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; margin-bottom: 12px; transition: border-color .2s; }
    .setup-input:focus { border-color: var(--red); }
    .setup-btn { width: 100%; padding: 14px; background: var(--red); border: none; border-radius: 8px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; cursor: pointer; transition: background .2s; }
    .setup-btn:hover { background: #cc0000; }
    .setup-hint { color: #333; font-size: 11px; margin-top: 16px; }
    #app { display: none; flex-direction: column; min-height: 100vh; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
    .logo span { color: var(--red); }
    .top-actions { display: flex; gap: 8px; }
    .btn-ghost { padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all .2s; }
    .btn-ghost:hover { border-color: #444; color: var(--text); }
    .add-row { display: flex; gap: 8px; padding: 16px 24px; border-bottom: 1px solid #111; }
    .add-input { flex: 1; padding: 10px 14px; background: var(--bg2); border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color .2s; }
    .add-input:focus { border-color: var(--red); }
    .add-btn { padding: 10px 20px; background: var(--red); border: none; border-radius: 8px; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; cursor: pointer; white-space: nowrap; transition: background .2s; }
    .add-btn:hover { background: #cc0000; }
    .add-btn:disabled { background: #333; cursor: not-allowed; }
    .error-bar { margin: 8px 24px; padding: 10px 14px; background: #1a0000; border: 1px solid #ff4444; border-radius: 8px; color: #ff6666; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 20px 24px; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color .2s, transform .15s; position: relative; }
    .card:hover { border-color: var(--red); transform: translateY(-2px); }
    .thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; }
    .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); color: transparent; font-size: 40px; transition: all .2s; }
    .card:hover .thumb-overlay { background: rgba(0,0,0,.4); color: #fff; }
    .card-body { padding: 12px 14px 14px; }
    .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-channel { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .card-stats { display: flex; gap: 12px; font-size: 12px; margin-bottom: 6px; }
    .card-updated { font-size: 10px; color: #333; }
    .empty { text-align: center; padding: 80px 24px; color: #333; }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .footer { text-align: center; padding: 16px; color: #222; font-size: 11px; border-top: 1px solid #111; margin-top: auto; }
    .ctx-menu { position: fixed; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 4px; z-index: 9999; min-width: 160px; box-shadow: 0 8px 32px rgba(0,0,0,.8); display: none; }
    .ctx-menu.show { display: block; }
    .ctx-item { padding: 8px 14px; font-size: 13px; cursor: pointer; border-radius: 5px; color: #ddd; transition: background .1s; }
    .ctx-item:hover { background: #222; }
    .ctx-item.danger { color: #ff4444; }
    .paused-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.8); border: 1px solid #444; border-radius: 4px; padding: 2px 7px; font-size: 10px; color: #888; letter-spacing: 1px; }
    #detail-screen { display: none; }
    .detail-header { padding: 16px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .back-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 12px; padding: 0; margin-bottom: 6px; display: block; }
    .back-btn:hover { color: var(--text); }
    .detail-title { font-size: 16px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; }
    .detail-channel { font-size: 12px; color: var(--muted); }
    .stat-row { display: flex; gap: 12px; padding: 16px 24px; }
    .stat-card { flex: 1; background: var(--bg2); border: 1px solid; border-radius: 10px; padding: 14px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 500; margin-bottom: 4px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
    .stat-label { font-size: 11px; color: var(--muted); }
    .chart-box { margin: 0 24px 16px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .metric-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .metric-tab { padding: 5px 14px; background: var(--bg3); border: 1px solid #2a2a2a; border-radius: 20px; color: var(--muted); cursor: pointer; font-size: 12px; font-family: 'DM Mono', monospace; transition: all .2s; }
    .metric-tab.active-views { background: var(--red); border-color: var(--red); color: #fff; }
    .metric-tab.active-likes { background: var(--pink); border-color: var(--pink); color: #fff; }
    .metric-tab.active-comments { background: var(--yellow); border-color: var(--yellow); color: #000; }
    canvas { max-height: 200px; }
    .table-wrap { margin: 0 24px 24px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .table-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .table-title { font-size: 13px; font-weight: 500; }
    .csv-btn { padding: 5px 12px; background: #0a1a0a; border: 1px solid #1a3a1a; border-radius: 6px; color: #5fba5f; cursor: pointer; font-size: 12px; font-family: 'DM Mono', monospace; transition: all .2s; }
    .csv-btn:hover { background: #0f2a0f; }
    .table-scroll { max-height: 320px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { padding: 8px 12px; color: var(--muted); font-weight: 500; text-align: left; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #0a0a0a; }
    tbody td { padding: 7px 12px; border-bottom: 1px solid #111; }
    tbody tr:nth-child(even) { background: #0d0d0d; }
    .center-msg { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">▶</div>
    <h1 class="setup-title">YT Tracker</h1>
    <p class="setup-sub">Railway 서버 URL을 입력해 시작하세요</p>
    <input class="setup-input" id="server-url-input" placeholder="https://yt-tracker-backend-production.up.railway.app" />
    <button class="setup-btn" onclick="saveServer()">연결 시작 →</button>
    <p class="setup-hint">서버 URL은 브라우저에 저장되며 다음 방문 시 자동 연결됩니다</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="logo"><span>▶</span> YT Tracker</div>
    <div class="top-actions">
      <button class="btn-ghost" onclick="showSetup()">⚙ 서버 설정</button>
      <button class="btn-ghost" onclick="loadVideos()">↻ 새로고침</button>
    </div>
  </div>
  <div class="add-row">
    <input class="add-input" id="url-input" placeholder="YouTube 링크를 붙여넣으세요 (예: https://youtu.be/xxxxx)" onkeydown="if(event.key==='Enter') addVideo()" />
    <button class="add-btn" id="add-btn" onclick="addVideo()">+ 등록</button>
  </div>
  <div id="error-bar" class="error-bar" style="display:none"></div>
  <div id="grid-area"></div>
  <div class="footer">우클릭으로 CSV 다운로드 · 삭제 가능 · 서버에서 1시간마다 자동 수집</div>
</div>

<div id="detail-screen">
  <div class="detail-header">
    <button class="back-btn" onclick="showMain()">← 목록으로</button>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-channel" id="d-channel"></div>
  </div>
  <div class="stat-row">
    <div class="stat-card" style="border-color:#ff2020">
      <div class="stat-val" style="color:#ff2020" id="d-views">—</div>
      <div class="stat-label">조회수</div>
    </div>
    <div class="stat-card" style="border-color:#ff6b6b">
      <div class="stat-val" style="color:#ff6b6b" id="d-likes">—</div>
      <div class="stat-label">좋아요</div>
    </div>
    <div class="stat-card" style="border-color:#ffd93d">
      <div class="stat-val" style="color:#ffd93d" id="d-comments">—</div>
      <div class="stat-label">댓글</div>
    </div>
  </div>
  <div class="chart-box">
    <div class="metric-tabs">
      <button class="metric-tab active-views" onclick="switchMetric('views', this)">조회수</button>
      <button class="metric-tab" onclick="switchMetric('likes', this)">좋아요</button>
      <button class="metric-tab" onclick="switchMetric('comments', this)">댓글</button>
    </div>
    <canvas id="myChart"></canvas>
    <div id="chart-msg" class="center-msg" style="display:none">데이터가 부족합니다 (1시간 후 업데이트)</div>
  </div>
  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title">시간별 데이터</span>
      <button class="csv-btn" onclick="downloadCSV()">↓ CSV 다운로드</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr><th>날짜/시간</th><th style="color:#ff2020">조회수</th><th style="color:#ff6b6b">좋아요</th><th style="color:#ffd93d">댓글</th></tr></thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="ctxDownload()">📥 CSV 다운로드</div>
  <div class="ctx-item" onclick="ctxDetail()">📊 통계 보기</div>
  <div class="ctx-item" id="ctx-pause-btn" onclick="ctxPause()">⏸ 모니터링 중지</div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑 영상 삭제</div>
</div>

<script>
  let SERVER = '';
  let videos = [];
  let currentVideo = null;
  let currentHistory = [];
  let currentMetric = 'views';
  let chart = null;
  let ctxTarget = null;

  const fmt = n => {
    if (n == null) return '—';
    if (n >= 1_000_000) return (n/1_000_000).toFixed(1)+'M';
    if (n >= 1_000) return (n/1_000).toFixed(1)+'K';
    return Number(n).toLocaleString();
  };

const fmtDate = s => {
    if (!s) return '';
    const d = new Date(s);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
  };

  window.onload = () => {
    const saved = localStorage.getItem('yt-tracker-server');
    if (saved) { SERVER = saved; showApp(); loadVideos(); }
    else showSetup();
  };

  function showSetup() {
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('detail-screen').style.display = 'none';
    if (SERVER) document.getElementById('server-url-input').value = SERVER;
  }
  function showApp() {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('detail-screen').style.display = 'none';
  }
  function showMain() {
    document.getElementById('app').style.display = 'flex';
    document.getElementById('detail-screen').style.display = 'none';
  }

  async function saveServer() {
    const url = document.getElementById('server-url-input').value.trim().replace(/\/$/, '');
    if (!url) return;
    try {
      const res = await fetch(`${url}/health`);
      if (!res.ok) throw new Error();
      SERVER = url;
      localStorage.setItem('yt-tracker-server', SERVER);
      showApp();
      loadVideos();
    } catch {
      alert('서버에 연결할 수 없습니다. URL을 확인해주세요.');
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-bar');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  async function loadVideos() {
    try {
      const res = await fetch(`${SERVER}/videos`);
      videos = await res.json();
      renderGrid();
    } catch { showError('서버에 연결할 수 없습니다.'); }
  }

  function renderGrid() {
    const area = document.getElementById('grid-area');
    if (!videos.length) {
      area.innerHTML = `<div class="empty"><div class="empty-icon">📺</div><p style="color:#555;margin-bottom:8px">등록된 영상이 없습니다</p><p style="color:#333;font-size:13px">위 입력창에 YouTube 링크를 붙여넣어 등록하세요</p></div>`;
      return;
    }
    area.innerHTML = `<div class="grid">${videos.map(v => `
      <div class="card" data-id="${v.video_id}" onclick="openDetail('${v.video_id}')" oncontextmenu="openCtx(event,'${v.video_id}')">
        <div class="thumb-wrap">
          <img src="${v.thumbnail}" alt="" loading="lazy" style="${v.paused ? 'filter:grayscale(1);opacity:.5' : ''}" />
          <div class="thumb-overlay">▶</div>
          ${v.paused ? '<div class="paused-badge">⏸ 일시정지</div>' : ''}
        </div>
        <div class="card-body">
          <div class="card-title" style="${v.paused ? 'color:#555' : ''}">${v.title}</div>
          <div class="card-channel">${v.channel}</div>
          <div class="card-stats">
            <span style="color:#ff2020">👁 ${fmt(v.views)}</span>
            <span style="color:#ff6b6b">♥ ${fmt(v.likes)}</span>
            <span style="color:#ffd93d">💬 ${fmt(v.comments)}</span>
          </div>
          <div class="card-updated">${v.paused ? '⏸ 수집 중지됨' : '업데이트: ' + (v.last_updated ? fmtDate(v.last_updated) : '—')}</div>
        </div>
      </div>`).join('')}</div>`;
  }

  async function addVideo() {
    const input = document.getElementById('url-input');
    const url = input.value.trim();
    if (!url) return;
    document.getElementById('add-btn').disabled = true;
    try {
      const res = await fetch(`${SERVER}/videos`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({url})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '등록 실패');
      input.value = '';
      loadVideos();
    } catch(e) { showError(e.message); }
    finally { document.getElementById('add-btn').disabled = false; }
  }

  async function openDetail(videoId) {
    const v = videos.find(x => x.video_id === videoId);
    if (!v) return;
    currentVideo = v;
    document.getElementById('d-title').textContent = v.title;
    document.getElementById('d-channel').textContent = v.channel;
    document.getElementById('d-views').textContent = fmt(v.views);
    document.getElementById('d-likes').textContent = fmt(v.likes);
    document.getElementById('d-comments').textContent = fmt(v.comments);
    document.getElementById('app').style.display = 'none';
    document.getElementById('detail-screen').style.display = 'block';
    document.getElementById('history-tbody').innerHTML = '<tr><td colspan="4" class="center-msg">불러오는 중...</td></tr>';
    try {
      const res = await fetch(`${SERVER}/videos/${videoId}/history?limit=336`);
      const data = await res.json();
      currentHistory = data.snapshots || [];
      renderTable();
      renderChart();
    } catch { document.getElementById('history-tbody').innerHTML = '<tr><td colspan="4" class="center-msg">오류 발생</td></tr>'; }
  }

  function renderTable() {
    const tbody = document.getElementById('history-tbody');
    if (!currentHistory.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="center-msg">데이터 없음</td></tr>';
      return;
    }
    tbody.innerHTML = [...currentHistory].reverse().map(s => `
      <tr>
        <td>${fmtDate(s.captured_at)}</td>
        <td style="color:#ff2020">${Number(s.views).toLocaleString()}</td>
        <td style="color:#ff6b6b">${Number(s.likes).toLocaleString()}</td>
        <td style="color:#ffd93d">${Number(s.comments).toLocaleString()}</td>
      </tr>`).join('');
  }

  function renderChart() {
    const canvas = document.getElementById('myChart');
    const msg = document.getElementById('chart-msg');
    if (currentHistory.length < 2) {
      canvas.style.display = 'none'; msg.style.display = 'block'; return;
    }
    canvas.style.display = 'block'; msg.style.display = 'none';
    const labels = currentHistory.map(s => fmtDate(s.captured_at));
    const colors = { views: '#ff2020', likes: '#ff6b6b', comments: '#ffd93d' };
    const dataMap = { views: currentHistory.map(s=>s.views), likes: currentHistory.map(s=>s.likes), comments: currentHistory.map(s=>s.comments) };
    if (chart) chart.destroy();
    chart = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: currentMetric === 'views' ? '조회수' : currentMetric === 'likes' ? '좋아요' : '댓글',
          data: dataMap[currentMetric],
          borderColor: colors[currentMetric],
          backgroundColor: colors[currentMetric] + '22',
          borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#555', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#1a1a1a' } },
          y: { ticks: { color: '#555', font: { size: 10 }, callback: v => fmt(v) }, grid: { color: '#1a1a1a' } }
        }
      }
    });
  }

  function switchMetric(metric, btn) {
    currentMetric = metric;
    document.querySelectorAll('.metric-tab').forEach(b => b.className = 'metric-tab');
    btn.classList.add(`active-${metric}`);
    renderChart();
  }

  function downloadCSV() {
    if (!currentVideo || !currentHistory.length) return;
    const header = '날짜/시간,조회수,좋아요,댓글\n';
    const rows = currentHistory.map(s => `"${fmtDate(s.captured_at)}",${s.views},${s.likes},${s.comments}`).join('\n');
    const blob = new Blob(['\uFEFF' + header + rows], {type: 'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${currentVideo.title}_stats.csv`;
    a.click();
  }

  function openCtx(e, videoId) {
    e.preventDefault();
    ctxTarget = videos.find(v => v.video_id === videoId);
    const btn = document.getElementById('ctx-pause-btn');
    btn.textContent = ctxTarget && ctxTarget.paused ? '▶ 모니터링 재개' : '⏸ 모니터링 중지';
    const menu = document.getElementById('ctx-menu');
    menu.style.top = e.clientY + 'px';
    menu.style.left = e.clientX + 'px';
    menu.classList.add('show');
  }
  async function ctxDownload() {
    closeCtx();
    if (!ctxTarget) return;
    const res = await fetch(`${SERVER}/videos/${ctxTarget.video_id}/history?limit=9999`);
    const data = await res.json();
    const v = ctxTarget;
    const header = '날짜/시간,조회수,좋아요,댓글\n';
    const rows = (data.snapshots||[]).map(s => `"${fmtDate(s.captured_at)}",${s.views},${s.likes},${s.comments}`).join('\n');
    const blob = new Blob(['\uFEFF' + header + rows], {type: 'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${v.title}_stats.csv`;
    a.click();
  }
  function ctxDetail() { closeCtx(); if (ctxTarget) openDetail(ctxTarget.video_id); }
  async function ctxDelete() {
    closeCtx();
    if (!ctxTarget || !confirm(`"${ctxTarget.title}" 영상을 삭제할까요?`)) return;
    await fetch(`${SERVER}/videos/${ctxTarget.video_id}`, {method:'DELETE'});
    loadVideos();
  }
  async function ctxPause() {
    closeCtx();
    if (!ctxTarget) return;
    const newPaused = !ctxTarget.paused;
    await fetch(SERVER+'/videos/'+ctxTarget.video_id+'/pause', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({paused: newPaused})
    });
    loadVideos();
  }
  function closeCtx() { document.getElementById('ctx-menu').classList.remove('show'); }
  document.addEventListener('click', closeCtx);
</script>
</body>
</html>
